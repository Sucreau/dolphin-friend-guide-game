<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>中华白海豚交友指南</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* ⭐固定画布 */
#scene{
    width:1920px;
    height:1080px;
    position:relative;
    background-size:cover;
    background-position:left top;
    background-repeat:no-repeat;
}

/* 物体 */
.item{
    position:absolute;
    cursor:pointer;
    z-index:100;
}

/* 你的原始物体（不动） */
.boat {
    left: 830px;
    top: 190px;
    width: 300px;
    animation: floatUpDown 4s ease-in-out infinite;
}

.bird {
    left: 300px;
    top: 90px;
    width: 350px;
    animation: floatLeftRight 3s ease-in-out infinite;
}

.shells {
    left: 350px;
    top: 800px;
    width: 280px;
    animation: shake 2.5s ease-in-out infinite;
}

.footprints{

left:300px;
top:700px;
width:200px;

display:none;

animation:shake 2.5s ease-in-out infinite;

}

.speedboat{

left:1100px;
top:300px;
width:300px;

display:none;

animation:floatUpDown 4s ease-in-out infinite;

}

.telescope{

left:800px;
top:720px;
width:250px;

display:none;

animation:shake 2.5s ease-in-out infinite;

}

.dorsalfin{

left:1300px;
top:480px;
width:240px;

display:none;

opacity:1;

transition:opacity 1s ease;

animation:dorsalSwim 6s linear infinite;

}

.dorsalFast{

animation-duration:2s;

}

.fadeAway{

opacity:0 !important;

pointer-events:none;

}

.dorsalToBoat{

animation:none !important;

transition:
left 2s ease,
top 2s ease,
opacity 0.5s ease;

}

.dorsalFloat{

animation:floatUpDown 2.5s ease-in-out infinite !important;

}

.school{

left:300px;
top:670px;
width:470px;

display:none;

opacity:1;

transition:opacity 1s ease;

animation:floatLeftRight 3s ease-in-out infinite;

}

.boatfishnet{

left:430px;
top:240px;
width:550px;

display:none;

opacity:1;

transition:opacity 1s ease;

animation:floatUpDown 4s ease-in-out infinite;

}

.jellyfish{

left:300px;
top:420px;
width:320px;

display:none;

opacity:1;

transition:opacity 0.3s ease;

animation:floatUpDown 4s ease-in-out infinite;

}

.anemone{

left:1000px;
top:600px;
width:320px;

display:none;

opacity:1;

transition:opacity 0.3s ease;

animation:floatUpDown 3.5s ease-in-out infinite;

}

.noise{

left:180px;
top:120px;
width:300px;

display:none;

opacity:1;

transition:opacity 1s ease;

animation:noisePulse 2s ease-in-out infinite;

}

@keyframes noisePulse{

0%{
    transform:scale(1);
}

50%{
    transform:scale(1.08);
}

100%{
    transform:scale(1);
}

}

@keyframes floatUpDown {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

@keyframes floatLeftRight {
    0%   { transform: translateX(0px); }
    50%  { transform: translateX(15px); }
    100% { transform: translateX(0px); }
}

@keyframes shake {
    0%   { transform: rotate(0deg); }
    50%  { transform: rotate(5deg); }
    100% { transform: rotate(0deg); }
}

@keyframes dorsalSwim{

0%{
    transform:translateX(0px) scaleX(1);
}

45%{
    transform:translateX(-180px) scaleX(1);
}

50%{
    transform:translateX(-180px) scaleX(-1);
}

95%{
    transform:translateX(0px) scaleX(-1);
}

100%{
    transform:translateX(0px) scaleX(1);
}

}

#dialogBox{
    position:absolute;
    left:50%;
    bottom:30px;
    transform:translateX(-50%);

    width:800px;

    background:rgba(255,255,255,0.6);

    border:5px solid #5BBCE6;

    border-radius:25px;

    padding:25px;

    display:none;

    z-index:999;

    box-shadow:0 8px 20px rgba(0,0,0,0.25);

    animation: dialogAppear 0.3s ease;
}

#dialogTitle{
    font-size:30px;
    font-weight:bold;
    color:#1F6F8B;
    margin-bottom:12px;
}

#dialogText{
    font-size:24px;
    line-height:1.8;
    color:#333;
}

#dialogBox button{
    margin-top:20px;

    font-size:20px;

    border:none;

    background:#5BBCE6;

    color:white;

    padding:10px 25px;

    border-radius:15px;

    cursor:pointer;
}

@keyframes dialogAppear{
    from{
        opacity:0;
        transform:translateX(-50%) translateY(20px);
    }

    to{
        opacity:1;
        transform:translateX(-50%) translateY(0);
    }
}

#continueHint{

margin-top:20px;

text-align:right;

font-size:18px;

color:#888;

font-style:italic;

}

遮罩

@keyframes scrollFloat {

    <h2>白海豚交友指南</h2>

    <p id="task1">□ 找到白海豚</p>
    
    <p id="task2">□ 让它不害怕你</p>

    <p id="task3">□ 了解它的生活</p>

    <p id="task4">□ 帮它解决麻烦</p>

    <p id="task5">□ 赢得它的信任</p>

</div>
<script>
let typingTimer;
let guideTexts = [

    "首先从探索沙滩区域开始吧！",

    "点击画面内会动的物品，可以查看详情。",

    "打开右下角的任务清单，可以查看全部任务。",

    "不同的行动会影响海豚对你的信任值，请你务必谨慎行动哦。"

];

let guideIndex = 0;

let guideMode = false;
let isTyping = false;
let fullText = "";
let gameStarted = false;
let boatChecked = false;
let birdChecked = false;
let shellChecked = false;
let footprintsChecked = false;
let speedboatChecked = false;
let telescopeChecked = false;
let distanceEventStarted = false;
let eventTriggered = false;
let dolphinDialog = [

"出现了！那就是中华白海豚吗？",

"好好奇啊……要不要凑近看看呢？"

];

let dolphinDialogIndex = 0;
let dolphinEventStarted = false;

let dolphinMode = false;

let chapterEndMode = false;

function showDialog(title,text){

clearInterval(typingTimer);

fullText = text;

isTyping = true;

document.getElementById("dialogTitle").innerText = title;

document.getElementById("dialogBox").style.display = "block";

let dialogText = document.getElementById("dialogText");

dialogText.innerText = "";

let i = 0;

typingTimer = setInterval(function(){

    dialogText.innerText += text.charAt(i);

    i++;

    if(i >= text.length){

        clearInterval(typingTimer);

        isTyping = false;

    }

},50);

}

function closeDialog(){

let dialogText = document.getElementById("dialogText");

if(isTyping){

    clearInterval(typingTimer);

    dialogText.innerText = fullText;

    isTyping = false;

    return;

}

// 海洋交友大师引导

if(guideMode){

    guideIndex++;

    if(guideIndex < guideTexts.length){

        showGuideText();

        return;

    }

    guideMode = false;

    const guide = document.getElementById("guideCharacter");

    guide.classList.remove("show");

setTimeout(function(){

    guide.style.display = "none";

},500);



document.getElementById("dialogBox").style.display = "none";

if(
guideTexts.length == 5 &&
guideTexts[0] ==
"哦吼吼～看来你已经找到它了。"
){

    startChapter2();

}
if(chapter2EndMode){

chapter2EndMode = false;

prepareChapter3();

}
return;

}
if(chapter2MonologueMode){

chapter2MonologueIndex++;

if(chapter2MonologueIndex < chapter2Monologue.length){

    showChapter2Monologue();

    return;

}

chapter2MonologueMode = false;

const mc =
document.getElementById("mcCharacter");

mc.classList.remove("show");

setTimeout(function(){

    mc.style.display = "none";

},500);

document.getElementById("dialogBox").style.display = "none";

chapter2EndMode = true;

setTimeout(function(){

    guideTexts = [

        "哦吼吼~看样子你已经意识到了让白海豚不再害怕你的正确做法呢，很好很好~",

        "不过还有一个很重要的事情，是无论和谁做朋友都要做的哦？",

        "作为白海豚的“准朋友”的你，这件事很有必要呢，那就是——",

        "了解白海豚的生活！"

    ];

    startGuide();

},1000);

return;

}

const bgm = document.getElementById("bgm");

const bubblesBgm = document.getElementById("bubblesBgm");

function switchToBubblesBGM(){

const oldBgm = document.getElementById("bgm");
const newBgm = document.getElementById("bubblesBgm");

newBgm.volume = 0;
newBgm.currentTime = 0;
newBgm.play();

let fadeTime = 1000;
let stepTime = 50;
let steps = fadeTime / stepTime;

let oldVolume = oldBgm.volume;
let newVolume = 1;

let currentStep = 0;

let fadeTimer = setInterval(function(){

    currentStep++;

    oldBgm.volume = Math.max(
        0,
        oldVolume * (1 - currentStep / steps)
    );

    newBgm.volume = Math.min(
        1,
        newVolume * (currentStep / steps)
    );

    if(currentStep >= steps){

        clearInterval(fadeTimer);

        oldBgm.pause();
        oldBgm.currentTime = 0;
        oldBgm.volume = 1;

        newBgm.volume = 1;

    }

},stepTime);

}
